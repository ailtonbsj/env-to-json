<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENV ⇆ JSON Converter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 2rem; background-color: #f8f9fa; }
        [data-bs-theme="dark"] body { background-color: #212529; }
        .editor-textarea {
            font-family: 'Courier New', Courier, monospace;
            height: 400px;
            resize: vertical;
        }
        .container { max-width: 900px; }
    </style>
</head>
<body>

<div class="shadow-sm p-4 bg-body rounded">
    <h2 class="mb-4 text-center">ENV ⇆ JSON Converter</h2>

    <div class="d-flex flex-wrap gap-2 mb-3 justify-content-center">
        <button id="btnPaste" class="btn btn-outline-secondary">
            📋 Paste to Input
        </button>
        <button id="btnReverse" class="btn btn-warning">
            🔁 Mode: ENV to JSON
        </button>
        <button id="btnConvert" class="btn btn-primary fw-bold px-4">
            ⚡ Convert
        </button>
    </div>

    <div class="row g-3">
        <div class="col-md-6">
            <label id="lblInput" class="form-label fw-bold">ENV Input</label>
            <textarea id="txtInput" class="form-control editor-textarea" placeholder="Paste your text here..."></textarea>
        </div>
        <div class="col-md-6">
            <label id="lblOutput" class="form-label fw-bold">JSON Output</label>
            <textarea id="txtOutput" class="form-control editor-textarea" readonly placeholder="Output will appear here..."></textarea>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // State to track conversion direction
    let isEnvToJson = true;

    // DOM Elements
    const txtInput = document.getElementById('txtInput');
    const txtOutput = document.getElementById('txtOutput');
    const btnPaste = document.getElementById('btnPaste');
    const btnReverse = document.getElementById('btnReverse');
    const btnConvert = document.getElementById('btnConvert');
    const lblInput = document.getElementById('lblInput');
    const lblOutput = document.getElementById('lblOutput');

    // Toggle operation direction
    btnReverse.addEventListener('click', () => {
        isEnvToJson = !isEnvToJson;
        
        if (isEnvToJson) {
            btnReverse.innerHTML = '🔁 Mode: ENV to JSON';
            lblInput.innerText = 'ENV Input';
            lblOutput.innerText = 'JSON Output';
        } else {
            btnReverse.innerHTML = '🔁 Mode: JSON to ENV';
            lblInput.innerText = 'JSON Input';
            lblOutput.innerText = 'ENV Output';
        }

        // Swap the text in the text areas for convenience
        const temp = txtInput.value;
        txtInput.value = txtOutput.value;
        txtOutput.value = temp;
    });

    // Paste from clipboard
    // Note: Browsers require the app to be running on localhost or HTTPS for clipboard access
    btnPaste.addEventListener('click', async () => {
        try {
            const text = await navigator.clipboard.readText();
            txtInput.value = text;
        } catch (err) {
            alert('Failed to read clipboard. Your browser might require explicit permissions or a secure context (HTTPS/Localhost).');
            console.error('Clipboard error:', err);
        }
    });

    // Main Conversion Logic
    btnConvert.addEventListener('click', () => {
        const input = txtInput.value.trim();
        if (!input) {
            txtOutput.value = '';
            return;
        }

        try {
            if (isEnvToJson) {
                // ENV to JSON
                const lines = input.split('\n');
                const resultObj = {};

                lines.forEach(line => {
                    const trimmedLine = line.trim();
                    // Skip comments and empty lines
                    if (!trimmedLine || trimmedLine.startsWith('#')) return;

                    const splitIndex = trimmedLine.indexOf('=');
                    if (splitIndex === -1) return; // Skip invalid lines

                    const key = trimmedLine.slice(0, splitIndex).trim();
                    let value = trimmedLine.slice(splitIndex + 1).trim();

                    // Remove surrounding double or single quotes if present
                    if ((value.startsWith('"') && value.endsWith('"')) || 
                        (value.startsWith("'") && value.endsWith("'"))) {
                        value = value.slice(1, -1);
                    }

                    resultObj[key] = value;
                });

                txtOutput.value = JSON.stringify(resultObj, null, 2);
            } else {
                // JSON to ENV
                const parsedObj = JSON.parse(input);
                let envString = '';

                for (const [key, value] of Object.entries(parsedObj)) {
                    // Handling string values, wrapping in quotes if they contain spaces
                    let safeValue = value;
                    if (typeof value === 'string' && value.includes(' ')) {
                        safeValue = `"${value}"`;
                    }
                    envString += `${key}=${safeValue}\n`;
                }

                txtOutput.value = envString.trim();
            }
        } catch (err) {
            txtOutput.value = `Error during conversion:\n${err.message}`;
        }
    });
</script>
</body>
</html>
