<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENV ⇆ JSON Converter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 2rem; background-color: #f8f9fa; }
        [data-bs-theme="dark"] body { background-color: #212529; }
        .editor-textarea {
            font-family: 'Courier New', Courier, monospace;
            height: 400px;
            resize: vertical;
        }
        .container { max-width: 1000px; }
    </style>
</head>
<body>

<div class="shadow-sm p-4 bg-body rounded">
    <h2 class="mb-4 text-center">ENV ⇆ JSON Converter</h2>

    <div class="d-flex justify-content-center gap-2 mb-4">
        <button id="btnReverse" class="btn btn-warning">
            🔁 Mode: ENV to JSON
        </button>
        <button id="btnConvert" class="btn btn-primary fw-bold px-5">
            ⚡ Convert
        </button>
    </div>

    <div class="row g-3">
        <div class="col-md-6">
            <label id="lblInput" class="form-label fw-bold">ENV Input</label>
            <textarea id="txtInput" class="form-control editor-textarea" placeholder="Enter your text here..."></textarea>
            
            <div class="text-start mt-2">
                <button id="btnPaste" class="btn btn-outline-secondary btn-sm">
                    📋 Paste
                </button>
            </div>
        </div>

        <div class="col-md-6">
            <label id="lblOutput" class="form-label fw-bold">JSON Output</label>
            <textarea id="txtOutput" class="form-control editor-textarea" readonly placeholder="Output will appear here..."></textarea>
            
            <div class="text-end mt-2">
                <button id="btnCopy" class="btn btn-outline-success btn-sm">
                    📄 Copy
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // State to track conversion direction
    let isEnvToJson = true;

    // DOM Elements
    const txtInput = document.getElementById('txtInput');
    const txtOutput = document.getElementById('txtOutput');
    const btnPaste = document.getElementById('btnPaste');
    const btnCopy = document.getElementById('btnCopy');
    const btnReverse = document.getElementById('btnReverse');
    const btnConvert = document.getElementById('btnConvert');
    const lblInput = document.getElementById('lblInput');
    const lblOutput = document.getElementById('lblOutput');

    // 1. Toggle operation direction
    btnReverse.addEventListener('click', () => {
        isEnvToJson = !isEnvToJson;
        
        if (isEnvToJson) {
            btnReverse.innerHTML = '🔁 Mode: ENV to JSON';
            lblInput.innerText = 'ENV Input';
            lblOutput.innerText = 'JSON Output';
        } else {
            btnReverse.innerHTML = '🔁 Mode: JSON to ENV';
            lblInput.innerText = 'JSON Input';
            lblOutput.innerText = 'ENV Output';
        }

        // Swap the text in the text areas
        const temp = txtInput.value;
        txtInput.value = txtOutput.value;
        txtOutput.value = temp;
    });

    // 2. Paste from clipboard (Left aligned under input)
    btnPaste.addEventListener('click', async () => {
        try {
            const text = await navigator.clipboard.readText();
            txtInput.value = text;
        } catch (err) {
            alert('Failed to read clipboard. Ensure you are running this on a local server or HTTPS, as browsers restrict clipboard access on raw local files.');
            console.error('Clipboard error:', err);
        }
    });

    // 3. Copy to clipboard (Right aligned under output)
    btnCopy.addEventListener('click', async () => {
        try {
            if (!txtOutput.value) return;
            await navigator.clipboard.writeText(txtOutput.value);
            
            // Brief visual feedback
            const originalText = btnCopy.innerHTML;
            btnCopy.innerHTML = '✅ Copied!';
            setTimeout(() => btnCopy.innerHTML = originalText, 2000);
        } catch (err) {
            alert('Failed to copy to clipboard.');
            console.error('Clipboard error:', err);
        }
    });

    // 4. Main Conversion Logic
    btnConvert.addEventListener('click', () => {
        const input = txtInput.value.trim();
        if (!input) {
            txtOutput.value = '';
            return;
        }

        try {
            if (isEnvToJson) {
                // ENV to JSON conversion
                const lines = input.split('\n');
                const resultObj = {};

                lines.forEach(line => {
                    const trimmedLine = line.trim();
                    if (!trimmedLine || trimmedLine.startsWith('#')) return; // Skip empty/comments

                    const splitIndex = trimmedLine.indexOf('=');
                    if (splitIndex === -1) return; // Skip invalid lines

                    const key = trimmedLine.slice(0, splitIndex).trim();
                    let value = trimmedLine.slice(splitIndex + 1).trim();

                    // Strip wrapping quotes if they exist
                    if ((value.startsWith('"') && value.endsWith('"')) || 
                        (value.startsWith("'") && value.endsWith("'"))) {
                        value = value.slice(1, -1);
                    }

                    resultObj[key] = value;
                });

                txtOutput.value = JSON.stringify(resultObj, null, 2);
            } else {
                // JSON to ENV conversion
                const parsedObj = JSON.parse(input);
                let envString = '';

                for (const [key, value] of Object.entries(parsedObj)) {
                    // Wrap strings with spaces in quotes for safety
                    let safeValue = value;
                    if (typeof value === 'string' && value.includes(' ')) {
                        safeValue = `"${value}"`;
                    }
                    envString += `${key}=${safeValue}\n`;
                }

                txtOutput.value = envString.trim();
            }
        } catch (err) {
            txtOutput.value = `Error during conversion:\n${err.message}\n\nPlease check your input formatting.`;
        }
    });
</script>
</body>
</html>
