<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENV ↔ JSON Converter</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
    
    <style>
        body {
            background-color: #f8f9fa;
            padding: 2rem 0;
        }
        /* Custom styling for the CodeMirror editor wrappers */
        .CodeMirror {
            height: 580px;
            border: 1px solid #ced4da;
            border-radius: 0.375rem;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
        }
        body .container {
            max-width: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row mb-4 text-center">
        <h2>ENV ↔ JSON Converter</h2>
        <p class="text-muted">Convert between .env files and JSON objects easily.</p>
    </div>

    <div class="row mb-3">
        <div class="col d-flex justify-content-center gap-3">
            <button id="toggleBtn" class="btn btn-outline-primary">
                Mode: <strong>ENV to JSON</strong> (Click to Reverse)
            </button>
            <button id="convertBtn" class="btn btn-success">
                Convert Now ➔
            </button>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6 mb-3">
            <label id="inputLabel" class="form-label fw-bold">ENV Input</label>
            <textarea id="inputArea"></textarea>
            <div class="d-flex justify-content-start mt-2">
                <button id="pasteBtn" class="btn btn-secondary btn-sm">📋 Paste</button>
            </div>
        </div>

        <div class="col-md-6 mb-3">
            <label id="outputLabel" class="form-label fw-bold">JSON Output</label>
            <textarea id="outputArea"></textarea>
            <div class="d-flex justify-content-end mt-2">
                <button id="copyBtn" class="btn btn-primary btn-sm">Copy Plain Text 📄</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/properties/properties.min.js"></script>

<script>
    // --- 1. Initialization & State ---
    let currentMode = 'env2json'; // Can be 'env2json' or 'json2env'

    // Initialize Input Editor
    const inputEditor = CodeMirror.fromTextArea(document.getElementById("inputArea"), {
        lineNumbers: true,
        theme: "dracula",
        mode: "properties" // Default to ENV highlighting
    });

    // Initialize Output Editor
    const outputEditor = CodeMirror.fromTextArea(document.getElementById("outputArea"), {
        lineNumbers: true,
        theme: "dracula",
        mode: "application/json", // Default to JSON highlighting
        readOnly: false 
    });

    // --- 2. DOM Elements ---
    const toggleBtn = document.getElementById('toggleBtn');
    const convertBtn = document.getElementById('convertBtn');
    const pasteBtn = document.getElementById('pasteBtn');
    const copyBtn = document.getElementById('copyBtn');
    const inputLabel = document.getElementById('inputLabel');
    const outputLabel = document.getElementById('outputLabel');

    // --- 3. Conversion Logic ---
    function envToJson(envString) {
        const lines = envString.split('\n');
        const result = {};
        
        lines.forEach(line => {
            line = line.trim();
            // Ignore empty lines and comments
            if (line && !line.startsWith('#')) {
                // Split by the first equal sign
                const match = line.match(/^([^=]+)=(.*)$/);
                if (match) {
                    let key = match[1].trim();
                    let val = match[2].trim();
                    
                    // Strip optional surrounding quotes from env values
                    if ((val.startsWith('"') && val.endsWith('"')) || (val.startsWith("'") && val.endsWith("'"))) {
                        val = val.substring(1, val.length - 1);
                    }
                    result[key] = val;
                }
            }
        });
        return JSON.stringify(result, null, 2);
    }

    function jsonToEnv(jsonString) {
        if (!jsonString.trim()) return "";
        try {
            const obj = JSON.parse(jsonString);
            let envOutput = "";
            for (const [key, value] of Object.entries(obj)) {
                // Standard ENV formatting
                envOutput += `${key}=${value}\n`;
            }
            return envOutput.trim();
        } catch (e) {
            alert("Error: Invalid JSON input.");
            return "";
        }
    }

    // --- 4. Event Listeners ---
    
    // Toggle Mode Button
    toggleBtn.addEventListener('click', () => {
        const currentInput = inputEditor.getValue();
        const currentOutput = outputEditor.getValue();

        if (currentMode === 'env2json') {
            currentMode = 'json2env';
            toggleBtn.innerHTML = "Mode: <strong>JSON to ENV</strong> (Click to Reverse)";
            inputLabel.innerText = "JSON Input";
            outputLabel.innerText = "ENV Output";
            
            // Swap syntax highlighting
            inputEditor.setOption("mode", "application/json");
            outputEditor.setOption("mode", "properties");
        } else {
            currentMode = 'env2json';
            toggleBtn.innerHTML = "Mode: <strong>ENV to JSON</strong> (Click to Reverse)";
            inputLabel.innerText = "ENV Input";
            outputLabel.innerText = "JSON Output";
            
            // Swap syntax highlighting
            inputEditor.setOption("mode", "properties");
            outputEditor.setOption("mode", "application/json");
        }
        
        // Swap the texts between editors for convenience
        inputEditor.setValue(currentOutput);
        outputEditor.setValue(currentInput);
    });

    // Convert Button
    convertBtn.addEventListener('click', () => {
        const inputData = inputEditor.getValue();
        if (currentMode === 'env2json') {
            const jsonOutput = envToJson(inputData);
            outputEditor.setValue(jsonOutput);
        } else {
            const envOutput = jsonToEnv(inputData);
            if (envOutput) {
                outputEditor.setValue(envOutput);
            }
        }
    });

    // Paste Button
    pasteBtn.addEventListener('click', async () => {
        try {
            // Note: Reading clipboard requires HTTPS or localhost, and user permission
            const text = await navigator.clipboard.readText();
            inputEditor.setValue(text);
        } catch (err) {
            alert("Failed to read clipboard. Your browser might require you to allow clipboard permissions, or you might not be serving this over HTTPS/localhost.");
            console.error('Failed to read clipboard contents: ', err);
        }
    });

    // Copy Button
    copyBtn.addEventListener('click', async () => {
        try {
            // Get plain text directly from CodeMirror, avoiding HTML highlights
            const textToCopy = outputEditor.getValue();
            await navigator.clipboard.writeText(textToCopy);
            
            // Visual feedback
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "Copied! ✔️";
            setTimeout(() => { copyBtn.innerText = originalText; }, 2000);
        } catch (err) {
            alert("Failed to copy text.");
            console.error('Failed to copy text: ', err);
        }
    });
</script>

</body>
</html>
